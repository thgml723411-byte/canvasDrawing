<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>모달창만들기3</title>
    <link rel="stylesheet" href="./reset.css">
    <style>
    body{
     height: 100vh;
    }

    .windowBox{
     width: 100%;
     height: 100%;
     display: flex;
     justify-content: center;
     align-items: center;
     gap: 30px;
    }
    .windowBox img{
       width: 200px;
       height: 200px;
       object-fit: cover;
       border-radius: 10px;
    }

    /* 모달 */
    .bigBox{
       width: 100%;
       height: 100%;
       background-color: rgba(0,0,0,0.5);
       display: none;
       justify-content: center;
       align-items: center;
       position: fixed;/* 모달창이보일려면 */
       left: 0; top: 0;
    }
    .bigBox.on{
          display: flex;
    }

    .smllBox{
        width: 60%;
        height: 70%;
        background-color: white;
        border-radius: 10px;
    }

    .Box{
      width: 50%;
      height: 60%;
      background-color: white;
      border-radius: 10px;
      position: relative;
    }

    .btn{
      background-color: #333;
      color: white;
      font-size: 15px;
      padding: 5px;
      position: absolute;
      right: 10px; top: 10px;
    }

    .modalBox img{
        width: 80%;   
        height: 70%;
        object-fit: cover;
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        display: none;
    }
        .modalBox img.on{
            display: block;
        }

    </style>
</head>
<body>
    <div class="windowBox">
        <img src="./img/beach.png" alt="beach" />
        <img src="./img/girl.jpg" alt="girl" />
        <img src="./img/banana.jpg" alt="banana" />
    </div>

    <!-- 모달시작 -->
    <div class="bigBox on">
       <div class="smllBox">
         <div class="Box">
          <button class="btn">&times;</button>
           <div class="modalBox">
           <img src="./img/beach.png" alt="beach" />
           <img src="./img/girl.jpg" alt="girl" />
           <img src="./img/banana.jpg" alt="banana" />
        </div>
       </div>
     </div>
    </div>
    <!-- 모달종료 -->

     <script>
       let opens = document.querySelectorAll(".windowBox img")
        ,  bigBox = document.querySelector(".bigBox")
        ,  modalBox = document.querySelectorAll(".modalBox img")
        ,  btn = document.querySelector(".btn")

        opens.forEach(function(item, idx){
            item.addEventListener("click", function(){
                modalBox.forEach( function(img){
                    img.classList.remove("on")
                })
                bigBox.classList.add('on')
                modalBox[idx].classList.add("on")
    
            })
        })

        btn.addEventListener("click", function(){
            bigBox.classList.remove("on")
        })
     </script>
</body>
</html>
