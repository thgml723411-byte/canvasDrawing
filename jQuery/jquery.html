<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jQuery 명령어</title>
</head>
<body>
    <!--
    jQuery 기본(필수)명령어
    .text()::텍스트읽기/쓰기
    .html()::html읽기/쓰기
    ("#in").html("<div>안녕</div>")백티도됨
    .val()::요소의값을읽기/쓰기(input,select등)
    .attr()::속성(src,href등)읽기/쓰기
    .prop()::dom속성(checked,disabled등)읽기/쓰기
    .removeAttr(),removeProp()::속성제거


    ****클래스제어css넣다뺐다하는
    .css()::css읽기/쓰기
    .addClass()::클래스추가
    .removeClass()::클래스삭제
    .toggleClass()::클래스토글넣었다뺐다
    .hasClass()::특정클래스포함여부확인
    
    ****요소다루기
    .append()::요소뒤에추가
    .prepend()::요소앞에추가
    .remove()::요소제거
    .empty()::요소의내부내용제거
    .clone()::요소를복제

    ****이벤트
    .click(), .change(), .hover(), .keyup(), .dblclick()
    .trigger()::이벤트강제실행

    ****애니메이션
    .show() / .hide()::표시/숨김
    .fadeIn() / fadeOut()::서서히나타났다서서히사라짐
    .slideDown() / slideUp::
    .animate()::css애니메이션
     -->
</body>
</html>
