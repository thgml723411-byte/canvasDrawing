<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jQuery 장바구니</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #c7f1ff, #fff7a8, #ffffff);
        }

        .cart-wrap {
            width: 50%;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.75);
            border-radius: 20px;
            background-color: rgba(255, 255, 255, 0.62);
            box-shadow: 0 18px 42px rgba(56, 148, 180, 0.22);
            backdrop-filter: blur(12px);
        }

        h1 {
            margin: 0 0 20px;
            color: #238bad;
            text-align: center;
        }

        .cart-list {
            height: 260px;
            overflow: auto;
            padding: 12px;
            border: 1px solid rgba(35, 139, 173, 0.24);
            border-radius: 16px;
            background-color: rgba(255, 255, 255, 0.45);
        }

        .cart-item {
            display: grid;
            grid-template-columns: 1.2fr 100px 150px 120px;
            gap: 10px;
            align-items: center;
            margin-bottom: 10px;
            padding: 14px;
            border-radius: 14px;
            background-color: rgba(255, 255, 255, 0.78);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .cart-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 18px rgba(56, 148, 180, 0.18);
        }

        .name {
            color: #236d84;
            font-weight: bold;
        }

        .price,
        .item-total {
            color: #444;
            font-weight: bold;
            text-align: right;
        }

        .qty-box {
            display: flex;
            gap: 6px;
            justify-content: center;
        }

        .minus,
        .plus,
        .qty {
            width: 38px;
            height: 34px;
            border: 1px solid rgba(35, 139, 173, 0.28);
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
        }

        .minus,
        .plus {
            color: #238bad;
            background-color: #fff48d;
            cursor: pointer;
        }

        .minus:hover,
        .plus:hover {
            transform: translateY(-2px);
            background-color: #ffe95c;
        }

        .qty {
            color: #236d84;
            background-color: white;
            outline: none;
        }

        .option-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-top: 16px;
            padding: 14px;
            border-radius: 14px;
            background-color: rgba(255, 255, 255, 0.55);
        }

        #delivery {
            height: 40px;
            padding: 0 12px;
            border: 1px solid rgba(35, 139, 173, 0.28);
            border-radius: 10px;
            color: #236d84;
            font-weight: bold;
            outline: none;
        }

        .summary {
            margin-top: 16px;
            padding: 16px;
            border-radius: 14px;
            color: #236d84;
            font-size: 18px;
            font-weight: bold;
            line-height: 1.8;
            background-color: rgba(255, 255, 255, 0.72);
        }

        .summary span {
            color: #e3a600;
        }

        #scrollInfo {
            margin-top: 10px;
            color: #238bad;
            font-weight: bold;
            text-align: center;
        }

        @media (max-width: 680px) {
            .cart-item {
                grid-template-columns: 1fr;
            }

            .price,
            .item-total {
                text-align: left;
            }

            .qty-box {
                justify-content: flex-start;
            }

            .option-area {
                align-items: stretch;
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="cart-wrap">
        <h1>장바구니</h1>

                <!-- 상품 등록 영역 및 띄어쓰기 안내 메시지 선택 -->
        <div class="add-product-area">
            <input type="text" id="newProductName" placeholder="예: 파란색 양말">
            <input type="number" id="newProductPrice" placeholder="가격(원)">
            <button type="button" id="addNewItemBtn">등록</button>
            <div class="guide-text">※ 상품 이름 입력 시 식별을 위해 알맞은 띄어쓰기를 포함하여 정확히 입력해 주세요.</div>
        </div>

        <div class="cart-list">
            <div class="cart-item" data-price="12000">
                <div class="name">하늘 노트</div>
                <div class="price">12,000원</div>
                <div class="qty-box">
                    <button type="button" class="minus">-</button>
                    <input type="text" class="qty" value="0">
                    <button type="button" class="plus">+</button>
                </div>
                <div class="item-total">0원</div>
            </div>

            <div class="cart-item" data-price="8000">
                <div class="name">노랑 펜</div>
                <div class="price">8,000원</div>
                <div class="qty-box">
                    <button type="button" class="minus">-</button>
                    <input type="text" class="qty" value="0">
                    <button type="button" class="plus">+</button>
                </div>
                <div class="item-total">0원</div>
            </div>

            <div class="cart-item" data-price="15000">
                <div class="name">화이트 파우치</div>
                <div class="price">15,000원</div>
                <div class="qty-box">
                    <button type="button" class="minus">-</button>
                    <input type="text" class="qty" value="0">
                    <button type="button" class="plus">+</button>
                </div>
                <div class="item-total">0원</div>
            </div>
        </div>

        <div id="scrollInfo">스크롤 위치: 0px</div>

        <div class="option-area">
            <div>
                <label for="delivery" style="color:#236d84; font-weight:bold; margin-right:10px;">배송 옵션</label>
                <select id="delivery">
                    <option value="0">무료배송 0원</option>
                    <option value="3000">일반배송 3,000원</option>
                    <option value="5000">빠른배송 5,000원</option>
                </select>
            </div>
            <!-- 요약 영역을 총 합계만 남도록 대폭 수정 -->
            <div class="summary">
                총 합계: <span id="totalPrice">0원</span>
            </div>
        </div>
    </div>

<script>
    $(function(){
        // 금액 포맷 함수
        function comma(num) {
            return num.toLocaleString() + "원";
        }

        // 전체 금액 갱신 함수 (상품합계 + 배송비)
        function updateTotal() {
            let productTotal = 0;

            $(".cart-item").each(function(){
                let price = Number($(this).data("price"));
                let qty = Number($(this).find(".qty").val());

                if (!qty || qty < 0 || isNaN(qty)) {
                    qty = 0;
                }

                let itemTotal = price * qty;
                productTotal += itemTotal;

                $(this).find(".item-total").text(comma(itemTotal));
            });

            let deliveryFee = Number($("#delivery").val());
            let totalPrice = productTotal + deliveryFee;

            // 내부 계산은 유지하되, 화면에는 최종 '총 합계'만 매핑
            $("#totalPrice").text(comma(totalPrice));
        }

        // 동적 추가된 상품에도 이벤트를 바인딩하기 위해 상위 문서(document) 위임 처리
        $(document).on("click", ".plus", function(){
            let qtyInput = $(this).siblings(".qty");
            let qty = Number(qtyInput.val());
            qtyInput.val(qty + 1);
            updateTotal();
        });

        $(document).on("click", ".minus", function(){
            let qtyInput = $(this).siblings(".qty");
            let qty = Number(qtyInput.val());
            if (qty > 0) {
                qtyInput.val(qty - 1);
            }
            updateTotal();
        });

        $(document).on("keydown", ".qty", function(e){
            let allowKeys = ["Backspace", "Delete", "Tab", "ArrowLeft", "ArrowRight"];
            if (allowKeys.includes(e.key)) return;
            if ((e.key < "0" || e.key > "9") && (e.keyCode < 96 || e.keyCode > 105)) {
                e.preventDefault();
            }
        });

        $(document).on("input keyup", ".qty", function(){
            let val = $(this).val();
            if (val === "") {
                updateTotal();
                return;
            }
            let qty = Number(val);
            if (qty < 0 || isNaN(qty)) {
                $(this).val(0);
            }
            updateTotal();
        });

        // 배송비 설정 변경 시 반영
        $("#delivery").change(function(){
            updateTotal();
        });

        // 스크롤 위치 감지
        $(".cart-list").scroll(function(){
            let scrollTop = $(this).scrollTop();
            $("#scrollInfo").text("스크롤 위치: " + scrollTop + "px");
        });

        // 새로운 상품 추가 버튼 핸들러
        $("#addNewItemBtn").click(function(){
            let name = $("#newProductName").val().trim();
            let price = $("#newProductPrice").val().trim();

            if(!name || !price) {
                alert("상품 이름과 가격을 모두 정확히 입력해 주세요.");
                return;
            }

            // 새로운 아이템 HTML 구조 동적 생성
            let itemHtml = `
                <div class="cart-item" data-price="${price}">
                    <div class="name">${name}</div>
                    <div class="price">${Number(price).toLocaleString()}원</div>
                    <div class="qty-box">
                        <button type="button" class="minus">-</button>
                        <input type="text" class="qty" value="0">
                        <button type="button" class="plus">+</button>
                    </div>
                    <div class="item-total">0원</div>
                </div>
            `;

            $(".cart-list").append(itemHtml);
            
            // 1. [누락 보완] 이름과 가격 입력창 모두 초기화
            $("#newProductName").val('');
            $("#newProductPrice").val('');
            
            updateTotal();
        }); // 2. [오류 수정] 버튼 클릭 이벤트 함수를 정상적으로 닫음
    }); // 3. [오류 수정] jQuery전체 실행 블록을 정상적으로 닫음
</script>
</body>
</html>
