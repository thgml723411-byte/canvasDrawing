    <!--

    <script>
        ///정규표현식/g 
        //정규식을활용하는방법
        //1.test()명령어::정규표현식의내용이맞는지틀린지체크하는친구
        let a = "abcdef"
        document.write(/ghi/g.test(a)+"<br>") //true,flase

        //2.변수.match(/정규식/)
        //일치하면일치하는내용을출력,일치하지않으면null출력
        let b = "html css javascript"
        document.write(b.match(/react/g)+"<br>") //일치값,불이치값null

        let result = c.replace(/ /g,'') 
        document.write(c + " " + result + "<br>") //띄어쓰기
