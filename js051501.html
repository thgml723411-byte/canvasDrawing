<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        h2{
            color: rgb(50, 150, 50); /* 글자 색 */
            text-align: center; /* 글자 가운데 정렬 */
        }
        #dis{
            width: 200px; /* 가로 */
            height: 50px; /* 세로 */
            /* background-color: rgba(31, 187, 148,0.7); */ /* 배경 색 */
            border-radius: 5px; /* 테두리 곡선 */
            border: 1px solid rgb(26, 185, 111); /* 테두리 선 */
            margin: 0 auto;           /* 정렬 */
            text-align: center;       /* 글자 가운데 정렬 */
            display: flex;            /* 정렬 */
            justify-content: center; /* 가로 가운데 정렬 */
            align-items: center;     /* 세로 가운데 정렬 */
            color: rgb(8, 78, 8); /* 글자 색 */
        }
        #btngroup{
             display: flex;           /* 정렬 */
             justify-content: center; /* 가로 가운데 정렬 */
             gap: 10px;               /* 버튼 사이 간격 */
             margin-top: 20px;        /* 위쪽 여백 */
        }

    </style>
</head>
<body>
    <!-- 포인트 관리 시스템 구현하기 -->

    <h2>포인트 관리 시스템</h2>
    <div id="dis">현재 포인트:점</div>
       <div id="btngroup">
        <button id="abtn">적립(+10점)</button>
        <button id="bbtn">사용(-30점)</button>
        <button id="ctn">조회</button>
        </div>

    <script>
    //포인트 관리 시스템 리턴활용하여 구현하기

    // 1.변수들고들어와야하는것
       let dis = document.querySelector('#dis')
       let abtn = document.querySelector('#abtn')
       let bbtn = document.querySelector('#bbtn')
       let ctn = document.querySelector('#ctn')

    // 2. 변수 초기화
       let point = 0;

    // 3. 포인트 계산 함수 (리턴 활용)
    // 매개변수(amt)를 받아 기존 포인트에 더한 후 최종 값을 반환합니다.
       function updatePoint(amt) {
        point += amt;
        if (point < 0) { // 포인트가 마이너스가 되지 않게 방어 코드 추가
            point = 0;
            alert("포인트가 부족합니다!");
        }
        return point;
        }

    // 4. 화면 업데이트 함수
       function display(value) {
        dis.innerHTML = `현재 포인트: ${value}점`;
        }

    // 5. 이벤트 연결
    // 적립 버튼
        abtn.onclick = function() {
        const result = updatePoint(10); // 10점 더하고 결과 받기
        display(result);
        };

    // 사용 버튼
        bbtn.onclick = function() {
        const result = updatePoint(-30); // 30점 빼고 결과 받기
        display(result);
        };

    //초기 화면 설정
        dis.innerHTML = `현재포인트: 0점`;

    </script>
</body>
</html>
