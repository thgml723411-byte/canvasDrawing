<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h2{
            color: rgb(50, 150, 50); /* 글자 색 */
            text-align: center; /* 글자 가운데 정렬 */
        }
        #dis{
            width: 200px; /* 가로 */
            height: 50px; /* 세로 */
            /* background-color: rgba(31, 187, 148,0.7); */ /* 배경 색 */
            border-radius: 5px; /* 테두리 곡선 */
            border: 1px solid rgb(26, 185, 111); /* 테두리 선 */
            margin: 0 auto;           /* 정렬 */
            text-align: center;       /* 글자 가운데 정렬 */
            display: flex;            /* 정렬 */
            justify-content: center; /* 가로 가운데 정렬 */
            align-items: center;     /* 세로 가운데 정렬 */
            color: rgb(8, 78, 8); /* 글자 색 */
        }
        #btngroup{
             display: flex;           /* 정렬 */
             justify-content: center; /* 가로 가운데 정렬 */
             gap: 10px;               /* 버튼 사이 간격 */
             margin-top: 20px;        /* 위쪽 여백 */
        }
    </style>
</head>
<body>

<!-- 포인트 관리 시스템 구현하기 -->

    <h2>포인트 관리 시스템</h2>
    <div id="dis">현재 포인트:점</div>
       <div id="btngroup">
        <button id="abtn">적립(+10점)</button>
        <button id="bbtn">사용(-30점)</button>
        <button id="ctn">조회</button>
        </div>


    <script>

// 1. 요소 선택
let dis = document.querySelector('#dis');
let abtn = document.querySelector('#abtn');
let bbtn = document.querySelector('#bbtn');
let ctn = document.querySelector('#ctn');

// 2. 데이터 초기화
let point = 0;

// 3. 포인트 계산 및 출력 함수 (리턴 없음)
// 결과값을 반환하지 않고, 함수 안에서 점수를 수정하고 화면까지 바로 바꿉니다.
function updateAndDisplay(amt) {
    point += amt;

    if (point < 0) {
        point = 0;
        alert("포인트가 부족합니다!");
    }

// 리턴을 받는 대신, 직접 화면 업데이트 함수를 호출하거나 내용을 수정함
    dis.innerHTML = `현재 포인트: ${point}점`;
}

// 4. 이벤트 연결
// 적립 버튼
abtn.onclick = function() {
    updateAndDisplay(10); // 실행만 하고 결과값을 변수에 담지 않음
};

// 사용 버튼
bbtn.onclick = function() {
    updateAndDisplay(-30);
};

// 조회 버튼 (추가)
ctn.onclick = function() {
    alert(`고객님의 현재 포인트는 ${point}점입니다.`);
};

// 초기 화면 설정
dis.innerHTML = `현재 포인트: 0점`;
    </script>
</body>
</html>
