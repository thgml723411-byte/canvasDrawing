<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
    *{
        margin: 0; padding: 0;
    }

    .outbox{
        width: 300px;
        height: 200px;
        background-color: red;
        border-radius: 10px;
        display: flex;
        justify-content: center;
        align-items: center;
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%,-50%) ;
    }
    .inbox{
        width: 200px;
        height: 20px;
        background-color: white;
        position: absolute;
        left: 0;
        top: 70%;
        transform: translate(0,-70%);
    }
    .inbox1{
        width: 20px;
        height: 200px;
        background-color: white;
        position: absolute;
        left: 70%;
        top: 0;
        transform: translate(-70%,0);
    }
    </style>
</head>
<body>
    <div class="outbox"> 
        <div class="inbox"></div>
        <div class="inbox1"></div>
    </div>
</body>
</html>
