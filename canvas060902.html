<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>canvas Drawing app</title>
    <link rel="stylesheet" href="./reset.css" >
    <style>
        #container{
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #toolbar{
            width: 100%;
            height: 70px;
            background-color: #222;

            display: flex;
            justify-content: space-around;
            align-items: center;
            
        }
        #toolbar div * {
            color: white;
            font-weight: bold;
            margin-right: 10px;
        }
         #toolbar input{
            color : black;
         }
         #toolbar button{
            border: none;
            background-color: red;
            color: white;
            padding: 5px 20px;
            cursor: pointer;
         }
         /* 다운로드 버튼 스타일 (선택 사항) */
        #downfile {
            background-color: #4CAF50; /* 녹색 배경 */
            color: white;
            border: none;
            padding: 6px 12px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
        }
        #downfile:hover {
            background-color: #45a049; /* 마우스 올렸을 때 더 어두운 녹색 */
        }
    </style>
</head>
<body>
   <div id="container">
        <div id="toolbar">
            <div>
                <!-- oninput 속성을 사용하여 HTML에서 스크립트 함수를 직접 호출 -->
                <label for="strokeColor">색상</label>
                <input type="color" id="strokeColor" value="#000"  />

                <label for="lwidth">선굵기</label>
                <input type="number" id="lwidth" value="2" min="1" max="50"  />

                <label for="bgColor">배경색</label>
                <input type="color" id="bgColor" value="#fff" />
            </div>

            <button id="reset">지우기</button>
            <button id="downfile">다운로드</button>
        </div>
        <canvas id="canvas"></canvas>
   </div>

   <script>
        const canvas = document.querySelector("canvas")
        const toolbar = document.getElementById("toolbar")

            canvas.width = window.innerWidth
            canvas.height = window.innerHeight - toolbar.offsetHeight;

            let canvasOffsetX = canvas.offsetLeft
            let canvasOffsetY = canvas.offsetTop

            let isDrawing = false

            let startX
            let startY
            let lineWidth = 2

            const ctx = canvas.getContext("2d")

            // 선색상, 선굵기 변경 이벤트
            toolbar.addEventListener("change", function(e){
                if(e.target.id === "strokeColor"){
                    ctx.strokeStyle = e.target.value;
                }

                if(e.target.id === 'lwidth'){
                    lineWidth = e.target.value
                }

                 if(e.target.id === 'bgColor'){
                    canvas.style.backgroundColor = e.target.value
                }
            })

            canvas.addEventListener("mousedown", function(e){
                isDrawing = true;
                startX = e.clientX
                startY = e.clientY
            })

            canvas.addEventListener("mousemove", function(e){
                if(!isDrawing) return
                ctx.lineWidth = lineWidth
                ctx.lineCap = 'round'
                ctx.lineTo(e.clientX, e.clientY - canvasOffsetY )
                ctx.stroke()
            })

            canvas.addEventListener("mouseup", function(){
                isDrawing = false
                ctx.beginPath()
            })

            toolbar.addEventListener("click", function(e){
                if(e.target.id === "reset"){
                    ctx.clearRect(0,0,canvas.width, canvas.height)
                }
            })
    </script>
</body>
</html>
