    <style>
    *{margin: 0; padding: 0;}

    .topbox{
     position: fixed;
     width: 100%;
     height: 50px;
     background-color: black;
     display: flex;
     justify-content: center;
     align-items: center;
     z-index: 10;
    }
      .logbox{
        width: 35%;
        height: 100%;
        /* background-color: red; */
        display: flex;
        justify-content:start;
        align-items: center;
        
      }
        .logbox img{
          width: 100px;
          object-fit: contain; 
          margin: 0 auto;    

      }
      .menubox{
        width: 45%;
        height: 100%;
        /* background-color: gold; */
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 20px;
        color: white;
      }
        .menubox .orange{
           color: orangered;
        }
      .korbox{
        width: 20%;
        height: 100%;
        /* background-color: blue; */

        display: flex;
        justify-content: end;
        align-items: center;
        color: white;
        padding-right: 20px;
      }
    .mainimgbox{
        position: relative;
        width: 100%;
        height: 250px;
        /* background-color: gold; */
        background-image: url(./img/eee.jpeg);
        background-position: center;
        background-repeat: no-repeat;
        background-size: cover;
    } 
       .textbox{
        position: absolute;
        top: 50%;
        width: 100%;
        height: 50%;
        transform: translateY(-50%);
        /* background-color: gold; */
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
       } 


       .textbox .orange{
        color: orangered;
        font-size: 20px;
       }
       .textbox .white{
        color: white;
        font-size: 30px;
       }
       .subMenuBox{
        width: 75%;
        height: 35px;
        background-color: rgba(255,255,255,0.6);
        position: absolute;
        left: 50%; bottom: 0px;
        transform: translateX(-50%);
        display: flex;
        justify-content: center;
        align-items: center;
        
       }
      
    .box{
        width: 25%;
        height: 100%;
        background-color: aqua;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .subMenuFirst{
          color: white;
          background-color: orangered;
          width: 25%;
          height: 100%;
          display: flex;
          justify-content: center;
          align-items: center
       }

        .ball{
            position: fixed;
            right: 20px;
            bottom: 20px;
            background-color: orangered;
            color: white;
            border-radius: 50%;
            z-index: 10;
        }
    .title{
        font-size: 30px;

    }

    .line{
        width: 150px;
        height: 2px;
        background-color: orangered;
        margin-bottom: 30px;
    }


    table{
        border: 1px solid black;
        border-collapse: collapse;
        width: 900px;
        margin: 0;
    }
    tr,td,th{
    border: 1px solid black;
    text-align: center;
    padding: 10px;
    }
    th{
    background-color: orangered;
    color: white;
    }
