<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스크롤</title>
    <link rel="stylesheet" href="./reset.css">
    <style>
        /* 섹션이3개박스도3개스크롤이벤트도3개 */
       section{
        width: 100%;
        height: 100vh;
        padding: 100px;
       }
       section:nth-child(1){
        background-color: skyblue;
       }
       section:nth-child(2){
        background-color: pink;
       }
       section:nth-child(3){
        background-color: lightgreen;
       }
       .box{
        width: 200px;
        height: 100px;
        border-radius: 10px;
        background-color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: all 0.3s;
        margin-bottom: 35px
       }
       section:nth-child(3) .box:nth-child(2){
        background-color: rgb(108, 39, 187);
       }
       .box.up{
        transform: translateY(150px);
        opacity: 0.1;
       }
      .box.left{
        transform: translate(200px);
        opacity: 0.3;
       }
       .box.right{
        transform: translateX(-200px);
        opacity: 0.3;
       }
       .box.on{
        transform: translate(0,0);
        opacity: 1;
       }
    </style>
</head>
<body>
    <!-- 섹션시작 -->
    <section>
        <div class="box up">1위로</div>
        <div class="box left">2왼쪽</div>
        <div class="box right">3오른쪽</div>
    </section>
    <section>
        <div class="box up">01위로</div>
        <div class="box left">02왼쪽</div>
        <div class="box right">03오른쪽</div>
    </section>
    <section>
        <div class="box up">001위로</div>
        <div class="box left">002왼쪽</div>
        <div class="box right">003오른쪽</div>
    </section>
    <!-- 섹션종료 -->
<script>
  let boxs = document.querySelectorAll('.box');

  let observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('on');
      }else{
        entry.target.classList.remove('on');
      }
    });
  }, {
    threshold: 0.3
  });
    boxs.forEach(function(box) {
    observer.observe(box);
  });
</script>
</body>
</html>
