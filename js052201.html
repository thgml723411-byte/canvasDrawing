<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>이미지 슬라이드</title>

    <link rel ="stylesheet" href="./reset.css"/>

    <style>

        body{

            background-color: black;

        }

        .wrap{

            width: 800px;

            /* height: 450px; */

            margin-top: 150px;    

            margin-bottom: 50px;  

            margin-left: auto;    

            margin-right: auto;    

            position: relative;

            border-radius: 10px;

            /* border: 2px solid #333; */

            overflow: hidden;

        }

            .slider{

                display: flex;

                /* transform: translateX(-800px); */

                transition:all 0.3s;

            }

                .slide{

                    width: 800px; height: 450px;

                    flex-shrink: 0;

                }

                    .slide img{

                        width: 100%; height: 100%;

                        object-fit: cover;

                    }


 

            button{

                color: white;

                width: 50px; height: 50px;

                background-color: #333;

                border-radius: 50%;

                font-size: 25px; font-weight: bold;

                margin: auto 10px;


 

                /* position: absolute;

                bottom:50%;

                transform: translateY(-50%); */

            }

                .btn{

                    width: 800px;

                    margin: 10px auto 0;  

                    text-align: right;

                }


 

                button:hover {

                    background-color: #555;

                }


 

    </style>

</head>

<body>

   

    <div class="wrap">

        <div class="slider" id="slider">

        </div>

    </div>


 

    <div class="btn">

        <button class="prev" onclick ="prevSlide()">&lt;</button>

        <button class="next" onclick ="nextSlide()">&gt;</button>

    </div>


 

    <script>

        class BasicSlider {

            constructor(imgs){

                this.imgs = imgs

                this.index = 0

                this.size = 800

                this.slider = document.querySelector("#slider")

            }


 

            makeSlide(){

                let html = ''

                this.imgs.forEach(function(item){

                    html += `

                        <div class="slide">

                            <img src= "${item}">

                        </div>

                    `

                })

                this.slider.innerHTML = html

            }


 

            move(){

                this.slider.style.transform = `translateX(-${this.index * this.size}px)`

            }


 

            next(){

                this.index++

                if(this.index >= this.imgs.length){

                    this.index = 0

            }

           

            this.move()

        }

       

        prev(){

            this.index--

            if(this.index <0){

                this.index = this.imgs.length-1          

        }

           this.move()

        }

    }



 

        let slideImg = [

            "./img/iphone1.jpg",

            "./img/iphone2.jpg",

            "./img/iphone3.jpg",

            "./img/iphone4.jpg",

            "./img/iphone5.jpg"

        ]


 

        let mySlider = new BasicSlider(slideImg)


 

        mySlider.makeSlide()


 

        function prevSlide(){

            mySlider.prev()

        }


 

        function nextSlide(){

            mySlider.next()

        }

       



 

    </script>

</body>

</html>
