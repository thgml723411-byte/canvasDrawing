<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    *{margin: 0; padding: 0;}
    html{
        scroll-behavior: smooth;
    }
    ul{
        list-style: none;
        position: fixed;
        z-index: 10;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 20px;
        width: 100%;
        height: 50px;
        background-color: darkblue;
    }
    a{
        color: black;
        text-decoration: none;
    }
    section{
        width: 100%;
        height: 700px;
        background: linear-gradient(50deg, skyblue, rgb(200, 225, 235));
        position: relative;
        scroll-margin-top: 50px;
    }
    #box2{
        background: pink;
    }
    </style>
</head>
<body>
    <ul>
        <li><a href="#box1">HOME</a></li>
        <li><a href="#box2">>ABOUT</a></li>
        <li><a href="#box3">CONTACT<</a></li>
    </ul>
    <section id="box1">
       첫 번째 섹션입니다
    </section>
        <section id="box2">
       두 번째 섹션입니다
    </section>
        <section id="box3">
       세 번째 섹션입니다
    </section>
</body>
</html>
