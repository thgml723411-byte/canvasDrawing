<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>canvas</title>
</head>
<body>
    <!--
    캔버스
    :: html 태그의 일조, 그림을 그릴 수 있는 빈 공간을 만드는 태그
    :: js로 그림을 그려야 함
    :: 자주 사용하는 효과
      ;;물방울 효과,눈내리는 효과, 차트 그리기,게임구현등
      ;;그림판만들기,화면보호기(물방울들이반사),벽돌게임
    :: getContext()메서드 -> 그림 그릴 도구를 가져오는 명령어 
    :: 도형그리기, 이미지 클리핑,그라이데이션,나만의드로잉앱만들기,화면보호기(물방울움직이기),벽돌게임
     -->
    <canvas width="800" height="500"></canvas>
    <script>
        let canvas = document.querySelector("canvas")
        let ctx = canvas.getContext('2d')//캔버스를 2d로 그릴 수 있는 도구를 가져오는 명령어

        //이미지클리핑
    //     let img = new Image()//이미지객체생성
    //     img.onload = function(){
    //         ctx.drawImage(img,0,0,canvas.width,canvas.height)//이미지가로드되었을때이걸사용할수있음
    //     }
    //     img.src = './img/back.jpg'
    //     //둥근사각클리핑
    //    // 1. 둥근 사각형 경로(Path) 만들기
    //     ctx.beginPath()//새롭게경로시작
    //     ctx.roundRect(150, 100, 450, 300, 30)// roundRect(x좌표, y좌표, 가로너비, 세로높이, 모서리반지름)
    //    // 2. 사각형 모양으로 캔버스 잘라내기(가위질)
    //     ctx.clip()//현재경로기준둥근사각형모양으로캔버스잘라내기


        //응용삼각형선그리기
        ctx.beginPath()         // 새롭게 경로 시작
        ctx.strokeStyle = 'red' // 테두리 선 색상 (빨강)
        ctx.fillStyle = 'red'   // [오타 수정] 'read' -> 'red'로 변경 (안에 채울 색상)
        ctx.lineWidth = 5       // 테두리를 더 잘 보이게 두께 추가 (선택사항)

        ctx.moveTo(100, 100)    // 1번 꼭짓점 (시작 포인터)
        ctx.lineTo(100, 200)    // 2번 꼭짓점 (아래로 직선 내리기)
        ctx.lineTo(200, 200)    // [좌표 수정] 오른쪽으로 꺾어서 3번 꼭짓점 만들기
        
        ctx.closePath()         // 시작점(100,100)으로 알아서 선을 이어 닫아줌
        
        ctx.fill()              // 안쪽에 빨간색 채우기
        ctx.stroke()            // 테두리에 빨간색 선 그리기
    </script>
</body>
</html>
