<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
    *{
        margin: 0; padding: 0;
    }

    .outbox{
        width: 160px;
        height: 100px;
        background-color: rgb(0,106,167);
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%,-50%) ;
    }
    .inbox{
        width: 160px;
        height: 20px;
        background-color: white;
        position: absolute;
        left: 0;
        top: 50%;
        transform: translate(0,-50%);
    }
    .inbox1{
        width: 20px;
        height: 160px;
        background-color: white;
        position: absolute;
        left: 30%;
        top: 0;
        transform: translate(0,-30%);
    }
    </style>
</head>
<body>
    <div class="outbox"> 
        <div class="inbox"></div>
        <div class="inbox1"></div>
    </div>
</body>
</html>
