<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .outbox{
        display: flex;
        justify-content: space-evenly;
        align-items: center;
        width: 500px;
        height: 500px;
        border: 1px solid black;
        flex-wrap: wrap;

    }
    .inbox{
        width: 100px ;
        height: 100px;
        background-color: black;
    }
    .first{
        width: 100px;
        height: 100px;
        background-color: white;
    }

</style>
<body>
    <div class="outbox" id="outbox"></div>
    <script>
      let outbox = document.getElementById('outbox')
      for(let i=1; i<=25; i++){
        if(i % 2 == 0){
        outbox.innerHTML += "<div class='inbox first'>" + '</div>'
      }else{
        outbox.innerHTML += "<div class='inbox'>" + '</div>'
      }
    }
        
    </script>
</body>
</html>
