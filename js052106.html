<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>계산기</title>
    <link rel="stylesheet" href="./reset.css">
    <style>
        
    .container{
        width: 100%;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        background-image: url(./img/back.jpg);
        background-position: center;
        background-repeat: no-repeat;
        background-size: cover;
        position: relative;
    }

    .calculator{
       border: 1px solid rgb(178, 156, 192);
       width: 600px;
       height: 1000px;
       padding: 5px;
       display: flex;
       justify-content: center;
       align-items: center;
       flex-direction: column;
       background-color: rgb(200, 106, 255);
       box-shadow: 3px 3px 3px 3px rgb(201, 137, 243);
       border-radius: 15px;
       z-index: 1;
    }
    #dis{
        width: 480px;
        height: 190px;
        background-color: rgb(189, 135, 206);
        border-radius: 10px;
        text-align: right;         
        line-height: 100px;        
        padding-right: 20px;       
        font-size: 2rem;           
        color: white;
        margin: 10px auto;
        margin-bottom: 40px
    }
    .outBox{
        width: 90%;
        display: grid;
        grid-template-columns: repeat(4, 1fr); 
        gap : 15px;
        }
        .outBox .box{
            width: 100%;
            height: 120px;
            background-color: darkblue;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 55px;
            transition: 0.2s;
        }
        .outBox .equal {
          grid-column: span 2; /* 가로로 2칸을 차지함 */
          border-radius: 50px; /* 길어지니까 타원형으로 변경 */
          height: 100%;        /* 높이는 다른 버튼과 동일하게 */
}
        .outBox .box:hover{
            background-color: white;    
            color: darkblue;            
            transform: scale(1.1);    
        }
          .outBox .box1{
            background-color: rgb(50, 104, 219);
            width: 100% ;
            grid-column: span 2; 
            border-radius: 50px;  /* 길쭉한 알약 모양 */
          }
        
        /* .purple{
          background-image: url(./img/pngwing.com.png);
          background-position: center;
          background-repeat: no-repeat;
          background-size: contain;
          width: 250px;       
          height: 250px;
          position: absolute;
          top: 8%; 
          left: 50%;
          transform: translateX(-50%); 
          z-index: 0;
        } */
    </style>
</head>
<body>
    <div class="container">
      <div class="purple"></div>
        <div class="calculator">
                <div id="dis">0</div>
                <div class="outBox">
                    <div class="box" onclick="clearall()">AC</div>
                    <div class="box" onclick="backSpace()">←</div>
                    <div class="box" onclick="setOp('%')">%</div>
                    <div class="box" onclick="setOp('/')">/</div>

                    <div class="box" onclick="pushNum('7')">7</div>
                    <div class="box" onclick="pushNum('8')">8</div>
                    <div class="box" onclick="pushNum('9')">9</div>
                    <div class="box" onclick="setOp('*')">*</div>

                    <div class="box" onclick="pushNum('4')">4</div>
                    <div class="box" onclick="pushNum('5')">5</div>
                    <div class="box" onclick="pushNum('6')">6</div>
                    <div class="box" onclick="setOp('+')">+</div>

                    <div class="box" onclick="pushNum('1')">1</div>
                    <div class="box" onclick="pushNum('2')">2</div>
                    <div class="box" onclick="pushNum('3')">3</div>
                    <div class="box" onclick="setOp('-')">-</div>

                    <div class="box" onclick="pushNum('0')">0</div>
                    <div class="box" onclick="pushNum('.')">.</div>
                    <div class="box box1" onclick="calc()">=</div>
                </div>
            </div>
    </div>
    
    <script>
      class Calculator {
    constructor(num1, num2) {
        this.num1 = num1
        this.num2 = num2
    }
    plus() { return this.num1 + this.num2 }
    minus() { return this.num1 - this.num2 }
    multi() { return this.num1 * this.num2 }
    divide() { return this.num1 / this.num2 }
    percent() { return (this.num1 * this.num2) / 100 }
}

let current = ''
let firstNum = ''
let operator = ''
let prevOperator = '' 

function backSpace() {
    current = current.slice(0, -1)
    updateScreen()
}

function clearall() {
    document.querySelector('#dis').innerHTML = '0'
    current = ''
    firstNum = ''
    operator = ''
    prevOperator = ''
}

function pushNum(num) {
    current += num;
    updateScreen();
}

function updateScreen() {
    let dis = document.querySelector('#dis')
    let displayValue = '';

    if (firstNum !== '') {
        let opLabel = (operator === '%') ? prevOperator + ' ' : operator + ' ';
        displayValue = firstNum.toLocaleString() + ' ' + opLabel;
    }

    if (current === '') {
        dis.innerHTML = displayValue || '0';
    } else {
        if (operator === '%') {
            dis.innerHTML = displayValue + Number(current).toLocaleString() + '%';
        } else {
            dis.innerHTML = displayValue + Number(current).toLocaleString();
        }
    }
}

function setOp(op) {
    if (current === '') return;

    if (op === '%') {
        prevOperator = operator; 
        firstNum = Number(firstNum || 0); 
        if(firstNum === 0) firstNum = Number(current); 
        operator = '%';
    } else {
        firstNum = Number(current);
        operator = op;
        current = '';
    }
    updateScreen();
}

function calc() {
    if (current === '' || firstNum === '') return;
    let secondNum = Number(current);
    let item = new Calculator(firstNum, secondNum);
    let result = 0;

    if (operator === '%') {
        let percentValue = item.percent(); 
        if (prevOperator === '+') result = firstNum + percentValue;
        else if (prevOperator === '-') result = firstNum - percentValue;
        else if (prevOperator === '*') result = percentValue; 
        else result = percentValue;
    } else {
        switch (operator) {
            case '+': result = item.plus(); break;
            case '-': result = item.minus(); break;
            case '*': result = item.multi(); break;
            case '/': result = item.divide(); break;
        }
    }
    current = String(result);
    firstNum = '';
    operator = '';
    prevOperator = '';
    document.querySelector('#dis').innerHTML = result.toLocaleString();
}
    </script>
</body>
</html>
