<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    h2{
       font-size: 30px;
       color: darkblue;
       text-align: center;
    }
    h3{
        font-size: 20px;
        color: black;
        text-align: center;
    }
    .container{
       width: 500px;
       background-color: skyblue;
       color: white;
       margin: 0 auto;
       padding: 10px;
       border-radius: 10px;
       /* display: contents;
       justify-content: center;
       align-items: center;
       flex-direction: column; */
    }
    span{
        color: gold;
        font-weight: bold;
        font-size: 17px;
    }
    </style>
</head>
<body>
    <h2>책목록</h2>
    <h3>가격이 25000원이상인것</h3>
    <div class="container"></div>
    
    <script>
        //2만5천원이상책이름,페이지모두출력

        let container = document.querySelector('.container')

        let books = [
            {title : 'html기초 습득하기', page : 350, price :22000},
            {title : 'css기초 습득하기', page : 550, price :27000},
            {title : 'js기초 습득하기', page : 650, price :32000},
            {title : 'jQuery기초 습득하기', page : 250, price : 19000},
        ]
        
          books.forEach(function(item){
          if(item.price >= 25000 ){
          container.innerHTML += `<div><span> 책이름 : ${item.title}</span>, 페이지 : ${item.page}, 가격 : ${item.price}원`
          }
        })
        

    </script>
</body>
</html>
