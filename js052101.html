<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>생성자함수 계산기</title>
    <link rel="stylesheet" href="reset.css">
    <style>
    .wrap{
        width: 390px;
        margin: 30px auto;
        background-color: aqua;
        border-radius: 10px;
        padding: 10px;
    }
    .screen{
        width: 100%;
        height: 60px;
        background-color: #ccc;
        font-size: 25px;
        text-align: right;
        font-weight: bold;
        padding: 15px;
        overflow: hidden;
        margin-bottom: 30px;
        border-radius: 10px;
    }
    .btnBox{
        display: grid; /* 부모가자식들을다루겠다 */
        grid-template-columns:repeat(4,1fr) ;  /* 칸을다루겠다칸을몇칸으로할건간 repeat반복하라*/
        gap: 10px;
        /* margin-top: 30px; 스크린에해도되고여기서해도되고*/
    }
    .btnBox button{
        /* width: ; 기껏만들었는데가로얼마해라라고하면안되니하지마라*/
        height: 70px;
        background-color: #999;
        border-radius: 10px;
        border: none;
        font-size: 20px;
    }
    .btnBox button:hover{
        background-color: #333;
    }
    .btnBox button.lastBtn{
        /* 고작하나할려고 정체를알려주별칭이길면효율적이지않으니 바디에바로써서*/
       grid-column: span 4; /* 합쳐주세요 */
    }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="screen">0</div>
    <div class="btnBox">
        <button onclick="backSpace()">back</button>
        <button onclick="clearall()">C</button>
        <button onclick="setOp('/')">/</button>
        <button onclick="setOp('*')">X</button>

        <button onclick="pushNum('7')">7</button>
        <button onclick="pushNum('8')">8</button>
        <button onclick="pushNum('9')">9</button>
        <button onclick="setOp('-')">-</button>

        <button onclick="pushNum('4')">4</button>
        <button onclick="pushNum('5')">5</button>
        <button onclick="pushNum('6')">6</button>
        <button onclick="setOp('+')">+</button>

        <button onclick="pushNum('1')">1</button>
        <button onclick="pushNum('2')">2</button>
        <button onclick="pushNum('3')">3</button>
        <button onclick="calc()">=</button>

        <button style="grid-column: span 4;" onclick="pushNum('0')">0</button>
    </div>

    <script>
        class Calculator{
            constructor(num1,num2){
                this.num1 = num1
                this.num2 = num2
            }
            plus(){
                return this.num1 + this.num2
            }
            minus(){
                return this.num1 - this.num2
            }
            multi(){
                return this.num1 * this.num2
            }
            divide(){
                return this.num1 / this.num2
            }
        }
        //받아줄수있는
        let current = '' //현재입력창변수
        let firstNum = '' //임시저장소변수
        let operator = '' //소멸되든말든변수
        let formula = ''//연산식담을변수

        //호출될수있는것들모두함수만들기
        function backSpace(){
            current = current.slice(0,-1) //
            updateScreen()
        }

        function clearall(){
            document.querySelector('.screen').innerHTML='0' //
            current = '' //초기화
            firstNum ='' //초기화
            operator = '' //초기화
            formula = '';//초기화
        }
        function pushNum(num) {
           current += num;
           updateScreen();
        }
        //백스페이스는하나씩지우면은스크린에표시되어야함 똑같이쓰이는것은오려서컨트롤엑스해서따로만들음
        function updateScreen(){
           let screen = document.querySelector('.screen')
           //에러났을때방지하기위해서
           if(current === ''){
            screen.innerHTML = '0'
            return
           }
            screen.innerHTML = Number(current).toLocaleString() 
        }
        function setOp(op){
        //에러났을때방지하기위해서
            if(current === ''){
                return
            }
            firstNum = Number(current)
            operator = op
            current = '' //새로받을준비
        } 
        function calc(){
            //에러났을때방지하기위해서
            if(current === '') return
            let secondNum = Number(current)

            let item = new Calculator(firstNum,secondNum)
            let result = 0;

            //
            switch(operator){
            case '+' :
            result = item.plus()
            break
            case '-' :
            result = item.minus()
            break
            case '*' :
            result = item.multi()
            break
            case '/' :
            result = item.divide()
            break
        }
        document.querySelector('.screen').innerHTML = result.toLocaleString()
    }
    </script>
</body>
</html>
