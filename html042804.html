<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    *{margin: 0; padding: 0;}
    html{scroll-behavior: smooth;}
    ul{
        list-style: none;
        position: fixed;
        z-index: 20;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 20px;
        width: 100%;
        height: 50px;
        background-color: black;
    }
    a{
        color: white;
        text-decoration: none; 
    }

    .cir{
        position: fixed;
        left: 10px;
        top:40%;
        width: 30px;
        height: 120px;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
    }
    .cir li{
        width: 25px;
        height: 25px;
        border-radius: 50%;
        background-color: red;
    }
    .cir li a{
        background-color: none;
    }
    /* a:hover{
        color: #020024;
    }    */

    section{
        width: 100%;
        height: 100vh;
        scroll-margin-top: 50px;
        display: flex;
        justify-content: center;
        align-items: center;

    }
    section div{
        width: 50% ;
        height: 30%;
        background-color: white;
        border-radius: 10px;
        text-align: center;
    }

    #box1{
         background: #EEAECA;
        background: radial-gradient(circle, rgba(238, 174, 202, 1) 0%, rgba(148, 187, 233, 1) 100%);
    }
    #box2{
        background: #020024;
        background: linear-gradient(90deg, rgba(2, 0, 36, 1) 0%, rgba(9, 9, 121, 1) 35%, rgba(0, 212, 255, 1) 100%);
    }
    #box3{
        background: #833AB4;
        background: linear-gradient(90deg, rgba(131, 58, 180, 1) 0%, rgba(253, 29, 29, 1) 50%, rgba(252, 176, 69, 1) 100%);
    }


    
    </style>
</head>
<body>

    <ul> 
        <li><a href="#box1">HOME</a></li>
        <li><a href="#box2">ABOUT</a></li>
        <li><a href="#box3">CONTACT</a></li>
    </ul>

    <ul class="cir" >
       <li><a href="#one1"></a></li>
        <li><a href="#one2"></a></li>
        <li><a href="#one3"></a></li>
    </ul>

    <section id="box1">
       <div>
        <h1>HOME</h1>
        첫 번째 섹션입니다 상단 메뉴와 좌측 메뉴를 클릭하면 이동합니다
       </div>
    </section>
    <section id="box2">  
       <div>
        <h1>ABOUT</h1>
        두 번째 섹션입니다 상단 메뉴와 좌측 메뉴를 클릭하면 이동합니다
       </div>
    </section>
    <section id="box3">
       <div>
        <h1>CONTACT</h1>
        세 번째 섹션입니다 상단 메뉴와 좌측 메뉴를 클릭하면 이동합니다
     </div>
    </section>
    
</body>
</html>
