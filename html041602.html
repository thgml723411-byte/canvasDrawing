<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
.box1{
    width: 150px;
    height: 100px;
    background-color: blueviolet;
    font-size: 30px;
    font-weight: bold;
    text-align: center;
    line-height: 100px;
    transition: all 0.3s;
    margin-bottom: 50px;
}

.box2{
    width: 150px;
    height: 100px;
    background-color: rgb(175, 117, 141);
    font-size: 30px;
    font-weight: bold;
    text-align: center;
    line-height: 100px;
    transition: all 0.3s;
    margin-bottom: 50px;
}

.box3{
    width: 150px;
    height: 100px;
    background-color: rgb(43, 226, 226);
    font-size: 30px;
    font-weight: bold;
    text-align: center;
    line-height: 100px;
    transition: all 0.3s;
    margin-bottom: 50px;
}


.box1:hover{
transform:scale(2)
}

.box2:hover{
    transform:rotate(45deg) ;
}

.box3:hover{
    transform: translatex(100px);
}

</style>
<body>
    <div class="box box1">s</div>
    <div class="box box2">r</div>
    <div class="box box3">r</div>
    
</body>
</html>
