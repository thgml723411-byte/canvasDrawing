<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css animation</title>
    <style>
    .wrap {
        width: 600px;
        height: 300px;
        background-image: linear-gradient(90deg, #241d23, #bb2aa5);
        border-radius: 10px;
        display: flex;
        align-items: center;            
        justify-content: center;          
        padding: 20px;
        position: relative;
        overflow: hidden;
        gap: 20px;
    }
    .wrap h2 {                
        color: white;
        margin: 0;
        font-size: 2rem;
    }
    .wrap img {                
        object-fit: cover;
        width: 250px;
        height: 250px;
        border-radius: 10px;
    }
    .cir{
        width: 250px;
        height: 250px;
        opacity: 1;
        border-radius: 50%;
        background-color: rgba(255,255,255,0.1);
        position: absolute;
        left: -50px; bottom: -50px;
        animation: one 5s infinite linear;
        z-index: 10;
    }
    @keyframes one{
     0%{
        transform: scale(1);
    }
     100%{
        transform: scale(10);
     }
   }

    </style>
</head>
<body>
    <div class="wrap">
        <h2>CSS ANIMATION</h2>
        <img src="./img/drink.jpg" alt="음료이미지"/>
        <div class="cir"></div>
    </div>
</body>
</html>
