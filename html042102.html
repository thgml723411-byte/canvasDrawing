<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
    *{
        margin: 0; padding: 0;
    }

    .outbox{
        width: 300px;
        height: 200px;
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%,-50%) ;
    }
    .inbox{
        width: 25px;
        height: 100px;
        background-color: rgb(255,0,0);
        position: absolute;
        left: 0;
        top: 0;
        transform: translate(0,0);
    }
    .inbox1{
        width: 100px;
        height: 100px;
        background-color: rgb(0,115,47);
        position: absolute;
        left: 10%;
        top: 0;
        transform: translate(0,10%);
    }
    .inbox2{
        width: 100px;
        height: 100px;
        background-color: rgb(255,255,255);
        position: absolute;
        left: 10%;
        top: 10%;
        transform: translate(10%,10%);
    }
    .inbox3{
        width: 100px;
        height: 100px;
        background-color: rgb(0,0,0);
        position: absolute;
        left: 0;
        top: 0;
        transform: translate(0,0);
    }
    </style>
</head>
<body>
    <div class="outbox"> 
        <div class="inbox"></div>
        <div class="inbox1"></div>
        <div class="inbox2"></div>
        <div class="inbox3"></div>
    </div>
</body>
</html>
