<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>키워드로 장소검색하기</title>
    <link rel="stylesheet" href="./reset.css">
    <style>
    body {
    height: 100vh;
    background-image: linear-gradient(#386592, #2f3a44);
    }
    /* 2. 지도와 검색창을 감싸는 카드 박스 */
    .search-container {
        width: 100%;
        max-width: 600px; /* 스마트폰~태블릿에 최적화된 너비 */
        padding: 20px;
        background-color: rgba(255, 255, 255, 0.75); 
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
    }
    /* 3. 검색창 입력 영역 (가로 정렬) */
    .search-box {
        display: flex;
        gap: 8px; /* 입력창과 버튼 사이 간격 */
        margin-bottom: 16px; /* 지도와의 간격 */
    }
    /* 4. 입력창 스타일 */
    #food {
        flex: 1; /* 남은 공간을 꽉 채움 */
        padding: 12px 16px;
        font-size: 15px;
        border: 1px solid #dee2e6;
        border-radius: 8px;
        outline: none;
        transition: border-color 0.2s;
    }
    #food:focus {
        border-color: #4a90e2; /* 포커스 시 파란색 테두리 */
    }
    /* 5. 검색 버튼 스타일 */
    #foodbtn {
        padding: 0 24px;
        font-size: 15px;
        font-weight: bold;
        color: #ffffff;
        background-color: #4a90e2; /* 깔끔한 블루 톤 */
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: background-color 0.2s;
    }
    #foodbtn:hover {
        background-color: #357abd; /* 마우스 올렸을 때 더 어두운 블루 */
    }
    /* 6. 지도 스타일 보정 */
    #map {
        border-radius: 8px; /* 지도 모서리도 둥글게 처리 */
        border: 1px solid #dee2e6;
        overflow: hidden;
    }
    </style>
</head>

<body>

<div class="search-container">
    <div class="search-box">
        <input id="food" type="text" placeholder="검색어를 입력하세요(예:이태원맛집)" />
        <button id="foodbtn">검색</button>
    </div>
    <div id="map" style="width:100%; height:400px;"></div>
</div>

<script type="text/javascript" src="http://.kakao.com/v2/maps/sdk.js?appkey=f31372f50de7327023abf3be4282e61c&libraries=services"></script>
<script>

       // 마커를 클릭하면 장소명을 표출할 인포윈도우 입니다 (재할당 없으므로 const)
        const infowindow = new kakao.maps.InfoWindow({zIndex:1});

        const mapContainer = document.getElementById('map'), // 지도를 표시할 div 
            mapOption = {
                center: new kakao.maps.LatLng(37.315958, 126.838641), // 지도의 중심좌표
                level: 3 // 지도의 확대 레벨
            };  

        // 지도를 생성합니다    
        const map = new kakao.maps.Map(mapContainer, mapOption); 

        // 장소 검색 객체를 생성합니다
        const ps = new kakao.maps.services.Places(); 

        // 검색 함수 정의
        function searchPlaces() {
            const keyword = document.getElementById('food').value;

            // 공백 제외 아무것도 입력하지 않았을 때 예외처리
            if (!keyword.replace(/^\s+|\s+$/g, '')) {
                alert('검색어를 입력해주세요!');
                return false;
            }

            // 인스턴스 된 Places 객체를 통해 키워드로 장소검색을 요청합니다
            ps.keywordSearch(keyword, placesSearchCB); 
        }

        // 버튼 클릭 이벤트 바인딩
        document.getElementById('foodbtn').addEventListener('click', searchPlaces);

        // 엔터키 입력 이벤트 바인딩
        document.getElementById('food').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchPlaces();
            }
        });

        // 키워드 검색 완료 시 호출되는 콜백함수 입니다
        function placesSearchCB (data, status, pagination) {
            if (status === kakao.maps.services.Status.OK) {

                // 검색된 장소 위치를 기준으로 지도 범위를 재설정하기위해
                // LatLngBounds 객체에 좌표를 추가합니다
                const bounds = new kakao.maps.LatLngBounds();

                // 반복문 루프 카운터는 let 사용
                for (let i = 0; i < data.length; i++) {
                    displayMarker(data[i]);    
                    bounds.extend(new kakao.maps.LatLng(data[i].y, data[i].x));
                }       

                // 검색된 장소 위치를 기준으로 지도 범위를 재설정합니다
                map.setBounds(bounds);
            } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
                alert('검색 결과가 존재하지 않습니다.');
                return;
            } else if (status === kakao.maps.services.Status.ERROR) {
                alert('검색 결과 중 오류가 발생했습니다.');
                return;
            }
        }

        // 지도에 마커를 표시하는 함수입니다
        function displayMarker(place) {
            
            // 마커를 생성하고 지도에 표시합니다
            const marker = new kakao.maps.Marker({
                map: map,
                position: new kakao.maps.LatLng(place.y, place.x) 
            });

            // 마커에 클릭이벤트를 등록합니다
            kakao.maps.event.addListener(marker, 'click', function() {
                // 마커를 클릭하면 장소명이 인포윈도우에 표출됩니다
                infowindow.setContent('<div style="padding:5px;font-size:12px;">' + place.place_name + '</div>');
                infowindow.open(map, marker);
            });
        }
</script>
</body>
</html>
